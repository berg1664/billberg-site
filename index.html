<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BILL BERG — group executive producer</title>
<meta name="description" content="Bill Berg — group executive producer, Minneapolis. Video reel.">
<style>
  html, body { margin: 0; height: 100%; background: #FCFAF5; }
  .wait {
    position: fixed; inset: 0; display: grid; place-items: center;
    font-family: "Courier New", Courier, monospace; font-size: 13px;
    letter-spacing: .1em; text-transform: uppercase; color: #000;
  }
</style>
<script>
  /* ============================================================
     DEVICE ROUTER
     Sends phones / small touchscreens to the swipe-feed (mobile.html)
     and everyone else to the floating-windows build (desktop.html).
     Both real pages live next to this file. Edit those, not this.
     ============================================================ */
  (function () {
    var ua = navigator.userAgent || "";
    var isPhone = /Android|iPhone|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
    var smallTouch = window.matchMedia("(max-width: 820px)").matches &&
                     window.matchMedia("(pointer: coarse)").matches;
    var target = (isPhone || smallTouch) ? "mobile.html" : "desktop.html";
    location.replace(target);   // replace() keeps the back button clean
  })();
</script>
</head>
<body>
  <div class="wait">loading…</div>
  <noscript>
    <div class="wait" style="flex-direction:column;gap:14px;">
      <a href="desktop.html">enter (desktop)</a>
      <a href="mobile.html">enter (mobile)</a>
    </div>
  </noscript>
</body>
</html>
